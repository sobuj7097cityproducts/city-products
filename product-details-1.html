<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Group — Product Details</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #181c27; --card: #1e2333; --border: #2a3045;
    --accent: #4f8ef7; --accent2: #a78bfa; --green: #34d399; --red: #f87171;
    --yellow: #fbbf24; --text: #e8ecf4; --muted: #7b869e; --input-bg: #252c3f;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* ===== LOGIN ===== */
  #loginPage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 40px 36px; width: 100%; max-width: 380px;
  }
  .login-logo {
    width: 52px; height: 52px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin: 0 auto 20px;
  }
  .login-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; text-align: center; }
  .login-sub { color: var(--muted); font-size: 0.82rem; text-align: center; margin-top: 4px; margin-bottom: 28px; }
  .field-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
  .field-input {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 0.92rem; padding: 12px 14px; outline: none; transition: border-color 0.15s;
    margin-bottom: 16px;
  }
  .field-input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 9px; font-size: 0.95rem; font-weight: 700; padding: 13px;
    cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s;
    margin-top: 4px;
  }
  .login-btn:hover { background: #3a7de8; }
  .login-error {
    background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3);
    color: var(--red); border-radius: 8px; padding: 10px 14px;
    font-size: 0.82rem; margin-top: 14px; text-align: center; display: none;
  }

  /* ===== APP ===== */
  #appPage { display: none; }
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-logo {
    width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .header-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 700; }
  .header-sub { font-size: 0.68rem; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .role-badge {
    font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .role-admin { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .role-user  { background: rgba(79,142,247,0.15); color: var(--accent); }
  .logout-btn {
    background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2);
    border-radius: 7px; padding: 6px 14px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s;
  }
  .logout-btn:hover { background: rgba(248,113,113,0.2); }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 24px; }
  .tab-btn {
    background: none; border: none; color: var(--muted); font-family: 'Inter', sans-serif;
    font-size: 0.85rem; font-weight: 500; padding: 12px 16px; cursor: pointer;
    border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover { color: var(--text); }

  .main { padding: 28px 24px; max-width: 1000px; margin: 0 auto; }
  .page-heading { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .page-desc { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }

  /* Products */
  .product-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; margin-bottom: 18px;
  }
  .card-header {
    padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .product-badge {
    width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 0.85rem; font-family: 'Space Grotesk', sans-serif;
  }
  .badge-jelfy    { background: rgba(79,142,247,0.15); color: #4f8ef7; }
  .badge-popup    { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .badge-kofitopi { background: rgba(52,211,153,0.15); color: #34d399; }
  .badge-gum      { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 700; }
  .card-id { font-size: 0.7rem; color: var(--muted); }
  .card-body { padding: 16px 20px; }

  .variants-table { width: 100%; border-collapse: collapse; }
  .variants-table thead th {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--muted); font-weight: 600; padding: 0 8px 8px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .variants-table thead th:first-child { padding-left: 0; }
  .variants-table tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
  .variants-table tbody td { padding: 9px 8px; font-size: 0.85rem; vertical-align: middle; }
  .variants-table tbody td:first-child { padding-left: 0; color: var(--muted); font-size: 0.72rem; }
  .edit-input {
    background: var(--input-bg); border: 1px solid transparent; border-radius: 6px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.85rem;
    padding: 6px 9px; outline: none; width: 100%; transition: border-color 0.15s;
  }
  .edit-input:focus { border-color: var(--accent); }
  .edit-input:disabled { background: transparent; color: var(--text); cursor: default; border-color: transparent; }
  .unit-sel {
    background: var(--input-bg); border: 1px solid transparent; border-radius: 6px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.85rem;
    padding: 6px 6px; outline: none; width: 70px; transition: border-color 0.15s;
  }
  .unit-sel:focus { border-color: var(--accent); }
  .unit-sel:disabled { background: transparent; cursor: default; border-color: transparent; }
  .del-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.9rem; padding: 4px 6px; border-radius: 5px; transition: color 0.15s, background 0.15s;
  }
  .del-btn:hover { color: var(--red); background: rgba(248,113,113,0.1); }
  .add-row-btn {
    background: none; border: 1px dashed var(--border); border-radius: 8px;
    color: var(--muted); cursor: pointer; font-size: 0.8rem; padding: 8px 14px;
    margin-top: 10px; width: 100%; transition: color 0.15s, border-color 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .add-row-btn:hover { color: var(--accent); border-color: var(--accent); }
  .save-fab {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    padding: 14px 24px; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    font-family: 'Inter', sans-serif; box-shadow: 0 4px 20px rgba(79,142,247,0.4);
    transition: background 0.2s, transform 0.1s;
  }
  .save-fab:hover { background: #3a7de8; }
  .save-fab:active { transform: scale(0.97); }

  /* ===== ADMIN PANEL ===== */
  .admin-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; margin-bottom: 18px;
  }
  .admin-card-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
  .user-table { width: 100%; border-collapse: collapse; }
  .user-table th {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--muted); font-weight: 600; padding: 0 8px 10px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .user-table td { padding: 9px 8px; font-size: 0.85rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .user-table tr:last-child td { border-bottom: none; }
  .u-input {
    background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.82rem;
    padding: 6px 9px; outline: none; width: 100%; transition: border-color 0.15s;
  }
  .u-input:focus { border-color: var(--accent); }
  .del-user-btn {
    background: rgba(248,113,113,0.1); color: var(--red); border: none;
    border-radius: 6px; padding: 5px 10px; font-size: 0.75rem; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .add-user-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif; margin-top: 14px; transition: background 0.2s;
  }
  .add-user-btn:hover { background: #3a7de8; }
  .save-users-btn {
    background: var(--green); color: #0f1117; border: none; border-radius: 8px;
    padding: 10px 22px; font-size: 0.85rem; font-weight: 700; cursor: pointer;
    font-family: 'Inter', sans-serif; margin-top: 10px; margin-left: 8px;
    transition: background 0.2s;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px; right: 24px;
    background: var(--green); color: #0f1117; font-weight: 700; font-size: 0.83rem;
    padding: 11px 20px; border-radius: 10px; opacity: 0; transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .hidden { display: none !important; }

  @media (max-width: 560px) {
    .main { padding: 18px 12px; }
    .header { padding: 12px 14px; }
    .card-body { padding: 12px 12px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">🍬</div>
    <div class="login-title">City Group</div>
    <div class="login-sub">Confectionary Division · Product Details</div>
    <label class="field-label">User ID</label>
    <input class="field-input" id="loginId" type="text" placeholder="Enter your ID" autocomplete="off">
    <label class="field-label">Password</label>
    <input class="field-input" id="loginPw" type="password" placeholder="Enter your password">
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="login-error" id="loginError">Invalid User ID or Password</div>
  </div>
</div>

<!-- APP -->
<div id="appPage">
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">🍬</div>
      <div>
        <div class="header-title">City Group</div>
        <div class="header-sub">Product Details</div>
      </div>
    </div>
    <div class="header-right">
      <span class="role-badge" id="roleBadge"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="tabs" id="tabsBar">
    <button class="tab-btn active" onclick="showTab('products')">📦 Products</button>
    <button class="tab-btn hidden" id="adminTab" onclick="showTab('admin')">⚙️ Manage Users</button>
  </div>

  <!-- Products Tab -->
  <div id="tabProducts" class="main">
    <div class="page-heading">Product Details</div>
    <div class="page-desc" id="productDesc"></div>
    <div id="productsGrid"></div>
    <button class="save-fab hidden" id="saveFab" onclick="saveAll()">💾 Save</button>
  </div>

  <!-- Admin Tab -->
  <div id="tabAdmin" class="main hidden">
    <div class="page-heading">Manage Users</div>
    <div class="page-desc">Add, edit or remove users. Changes take effect immediately after saving.</div>
    <div class="admin-card">
      <div class="admin-card-title">👤 Admin Account</div>
      <table class="user-table">
        <thead><tr><th>User ID</th><th>Password</th></tr></thead>
        <tbody>
          <tr>
            <td><input class="u-input" id="adminIdInput" type="text" placeholder="Admin ID"></td>
            <td><input class="u-input" id="adminPwInput" type="text" placeholder="Admin Password"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="admin-card">
      <div class="admin-card-title">👥 Users <span style="color:var(--muted);font-size:0.75rem;font-weight:400" id="userCount"></span></div>
      <table class="user-table">
        <thead><tr><th>#</th><th>User ID</th><th>Password</th><th></th></tr></thead>
        <tbody id="userTableBody"></tbody>
      </table>
      <button class="add-user-btn" onclick="addUser()">+ Add User</button>
      <button class="save-users-btn" onclick="saveUsers()">✓ Save All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== DEFAULT DATA =====
const DEFAULT_ADMIN = { id: 'admin', pw: 'admin123' };
const PRODUCTS = [
  { id: 'jelfy',    name: 'Jelfy',    badge: 'JL', cls: 'badge-jelfy' },
  { id: 'popup',    name: 'Pop Up',   badge: 'PU', cls: 'badge-popup' },
  { id: 'kofitopi', name: 'Kofitopi', badge: 'KT', cls: 'badge-kofitopi' },
  { id: 'gum',      name: 'GUM',      badge: 'GM', cls: 'badge-gum' },
];
const UNITS = ['mm', 'cm', 'inch'];

// ===== STORAGE =====
function load(k, def) {
  try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; }
}
function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

let adminCreds = load('cg_admin', DEFAULT_ADMIN);
let users      = load('cg_users', []);
let products   = load('cg_products', Object.fromEntries(PRODUCTS.map(p => [p.id, [{ name:'', length:'', width:'', unit:'mm' }]])));
let currentRole = null;

// ===== LOGIN =====
function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginError');
  adminCreds = load('cg_admin', DEFAULT_ADMIN);
  users      = load('cg_users', []);

  if (id === adminCreds.id && pw === adminCreds.pw) {
    currentRole = 'admin'; enterApp();
  } else {
    const u = users.find(u => u.id === id && u.pw === pw);
    if (u) { currentRole = 'user'; enterApp(); }
    else { err.style.display = 'block'; }
  }
}
document.getElementById('loginId').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPw').focus(); });
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function enterApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';

  if (currentRole === 'admin') {
    document.getElementById('roleBadge').textContent = 'Admin';
    document.getElementById('roleBadge').className = 'role-badge role-admin';
    document.getElementById('adminTab').classList.remove('hidden');
    document.getElementById('saveFab').classList.remove('hidden');
    document.getElementById('productDesc').textContent = 'Edit length, width and unit for each product variant.';
  } else {
    document.getElementById('roleBadge').textContent = 'User';
    document.getElementById('roleBadge').className = 'role-badge role-user';
    document.getElementById('adminTab').classList.add('hidden');
    document.getElementById('saveFab').classList.add('hidden');
    document.getElementById('productDesc').textContent = 'View product details below.';
  }
  products = load('cg_products', products);
  renderProducts();
  showTab('products');
}

function doLogout() {
  currentRole = null;
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

// ===== TABS =====
function showTab(tab) {
  document.getElementById('tabProducts').classList.toggle('hidden', tab !== 'products');
  document.getElementById('tabAdmin').classList.toggle('hidden', tab !== 'admin');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event && event.target && event.target.classList.add('active');
  if (tab === 'admin') renderAdminPanel();
}

// ===== PRODUCTS =====
function renderProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = '';
  const isAdmin = currentRole === 'admin';
  PRODUCTS.forEach(p => {
    const rows = products[p.id] || [{ name:'', length:'', width:'', unit:'mm' }];
    const rowsHtml = rows.map((r, i) => `
      <tr>
        <td>${i+1}</td>
        <td><input class="edit-input" data-p="${p.id}" data-i="${i}" data-f="name" value="${esc(r.name)}" placeholder="Variant name" ${isAdmin?'':'disabled'}></td>
        <td><input class="edit-input" data-p="${p.id}" data-i="${i}" data-f="length" type="number" value="${esc(r.length)}" placeholder="0" style="width:80px" ${isAdmin?'':'disabled'}></td>
        <td><input class="edit-input" data-p="${p.id}" data-i="${i}" data-f="width" type="number" value="${esc(r.width)}" placeholder="0" style="width:80px" ${isAdmin?'':'disabled'}></td>
        <td><select class="unit-sel" data-p="${p.id}" data-i="${i}" ${isAdmin?'':'disabled'}>
          ${UNITS.map(u=>`<option value="${u}" ${r.unit===u?'selected':''}>${u}</option>`).join('')}
        </select></td>
        ${isAdmin ? `<td><button class="del-btn" onclick="delRow('${p.id}',${i})">✕</button></td>` : '<td></td>'}
      </tr>`).join('');
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <div class="card-header">
        <div class="product-badge ${p.cls}">${p.badge}</div>
        <div><div class="card-title">${p.name}</div><div class="card-id">ID: ${p.id.toUpperCase()}</div></div>
      </div>
      <div class="card-body">
        <table class="variants-table">
          <thead><tr><th>#</th><th>Variant Name</th><th>Length</th><th>Width</th><th>Unit</th><th></th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
        ${isAdmin ? `<button class="add-row-btn" onclick="addRow('${p.id}')">+ Add Variant</button>` : ''}
      </div>`;
    grid.appendChild(card);
  });
  // live input binding
  grid.querySelectorAll('.edit-input').forEach(el => {
    el.addEventListener('input', () => {
      const { p, i, f } = el.dataset;
      if (!products[p]) return;
      products[p][parseInt(i)][f] = el.value;
    });
  });
  grid.querySelectorAll('.unit-sel').forEach(el => {
    el.addEventListener('change', () => {
      const { p, i } = el.dataset;
      products[p][parseInt(i)].unit = el.value;
    });
  });
}

function addRow(pid) {
  if (!products[pid]) products[pid] = [];
  products[pid].push({ name:'', length:'', width:'', unit:'mm' });
  renderProducts();
}
function delRow(pid, i) {
  if (products[pid].length <= 1) { products[pid][0] = { name:'', length:'', width:'', unit:'mm' }; }
  else products[pid].splice(i, 1);
  renderProducts();
}
function saveAll() {
  save('cg_products', products);
  showToast('✓ Saved!');
}

// ===== ADMIN PANEL =====
function renderAdminPanel() {
  adminCreds = load('cg_admin', DEFAULT_ADMIN);
  users      = load('cg_users', []);
  document.getElementById('adminIdInput').value = adminCreds.id;
  document.getElementById('adminPwInput').value = adminCreds.pw;
  renderUserTable();
}
function renderUserTable() {
  const tbody = document.getElementById('userTableBody');
  document.getElementById('userCount').textContent = `(${users.length}/20)`;
  tbody.innerHTML = users.map((u, i) => `
    <tr>
      <td style="color:var(--muted);width:30px">${i+1}</td>
      <td><input class="u-input" value="${esc(u.id)}" onchange="users[${i}].id=this.value" placeholder="User ID"></td>
      <td><input class="u-input" value="${esc(u.pw)}" onchange="users[${i}].pw=this.value" placeholder="Password"></td>
      <td><button class="del-user-btn" onclick="delUser(${i})">Remove</button></td>
    </tr>`).join('');
}
function addUser() {
  if (users.length >= 20) { showToast('Maximum 20 users!'); return; }
  users.push({ id:'', pw:'' });
  renderUserTable();
}
function delUser(i) { users.splice(i, 1); renderUserTable(); }
function saveUsers() {
  const newAdmin = { id: document.getElementById('adminIdInput').value.trim(), pw: document.getElementById('adminPwInput').value };
  if (!newAdmin.id || !newAdmin.pw) { showToast('Admin ID/Password cannot be empty!'); return; }
  save('cg_admin', newAdmin);
  adminCreds = newAdmin;
  // collect latest user inputs
  const rows = document.querySelectorAll('#userTableBody tr');
  users = Array.from(rows).map((_, i) => {
    const inputs = document.querySelectorAll(`#userTableBody tr:nth-child(${i+1}) .u-input`);
    return { id: inputs[0]?.value.trim()||'', pw: inputs[1]?.value||'' };
  }).filter(u => u.id);
  save('cg_users', users);
  showToast('✓ Users saved!');
  renderUserTable();
}

// ===== UTILS =====
function esc(v) { return (v||'').toString().replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
